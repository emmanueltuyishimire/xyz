backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: blog
    label: Blog Articles
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, pattern: ['.{1,60}', "Max 60 characters"] }
      - { label: Description, name: description, widget: text, pattern: ['.{1,160}', "Max 160 characters"] }
      - { label: Author, name: author, widget: relation, collection: authors, search_fields: ["name"], value_field: name, display_fields: ["name"], default: "T. Emmanuel" }
      - { label: Publish Date, name: publishDate, widget: datetime }
      - { label: Category, name: category, widget: select, options: [irs, social-security, medicare, medicaid, retirement, taxes, benefits, guides] }
      - { label: Tags, name: tags, widget: list }
      - { label: Featured Image, name: featuredImage, widget: image, required: false }
      - { label: Featured Image Alt Text, name: featuredImageAlt, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }

  - name: irs
    label: IRS Guides
    folder: src/content/irs
