[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

# -------------------------------------------------------
# Canonical www redirect — non-www → www (301 Permanent)
# Ensures Google only indexes the www version of the site.
# This is the single source of truth for URL canonicalization.
# -------------------------------------------------------
[[redirects]]
  from = "https://seniorsaudit.com/*"
  to = "https://www.seniorsaudit.com/:splat"
  status = 301
  force = true

# Redirect /admin to Decap CMS admin UI
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Map sitemap.xml to the sitemap-index.xml file generated by Astro
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 200

# SPA fallback is NOT needed for static Astro — each page is its own HTML file

[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content Security Policy
    # — Allows Google Fonts, Netlify Identity, Jotform contact form embed, and Google Analytics
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://unpkg.com https://www.jotform.com https://submit.jotform.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.jotform.com; font-src 'self' https://fonts.gstatic.com https://www.jotform.com; img-src 'self' data: https: https://www.google-analytics.com; frame-src https://www.jotform.com https://submit.jotform.com; connect-src 'self' https://api.netlify.com https://identity.netlify.com https://submit.jotform.com https://www.google-analytics.com https://*.google-analytics.com; object-src 'none';"

[[headers]]
  for = "/admin/*"
  [headers.values]
    # CMS-specific headers allowing unsafe-eval
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com https://www.jotform.com https://submit.jotform.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.jotform.com; font-src 'self' https://fonts.gstatic.com https://www.jotform.com; img-src 'self' data: https: https://www.google-analytics.com; frame-src https://www.jotform.com https://submit.jotform.com; connect-src 'self' https://api.netlify.com https://identity.netlify.com https://submit.jotform.com https://www.google-analytics.com https://*.google-analytics.com; object-src 'none';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

